services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=user_db'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'
  mysql:
    image: 'mysql:latest'
    environment:
      - 'MYSQL_DATABASE=message_db'
      - 'MYSQL_ROOT_PASSWORD=myRoot'
      - 'MYSQL_PASSWORD=myPass'
      - 'MYSQL_USER=myUser'
    ports:
      - '3306:3306'