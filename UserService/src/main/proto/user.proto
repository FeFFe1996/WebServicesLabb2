syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.example.grpc";
option java_outer_classname = "UserProto";

package user;

service UserService{
  rpc createUser (createRequest) returns (createdUser);
}

message createRequest{
  string user_id = 1;
}

message createdUser{
  string user_id = 1;
  string username =2;
}