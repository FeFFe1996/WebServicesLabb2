syntax = "proto3";

option java_multiple_files = true;
option java_package = "org.example.grpc";
option java_outer_classname = "UserProto";

package user;

service UserService{
  rpc sendUserInfo (CreateRequest) returns (UserInfo);
}

message CreateRequest{
  string username = 1;
}

message UserInfo{
  string username = 1;
}